<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME ROW // INTENT LAB v1.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #080c08;
  --bg2:         #0c110c;
  --bg3:         #101510;
  --green:       #33ff00;
  --green-dim:   #196600;
  --green-faint: #0a2e0a;
  --amber:       #ffbb00;
  --red:         #ff2200;
  --white:       #b8e8b8;
  --purple:      #dd00ff;
  --border:      #1a3a1a;
  --font-crt:    'VT323', monospace;
  --font-body:   'Courier Prime', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg); color: var(--green);
  font-family: var(--font-body); font-size: 13px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.11) 2px,rgba(0,0,0,0.11) 4px);
  pointer-events: none; z-index: 9999;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none; z-index: 9998;
}
@keyframes flicker {
  0%,89%,91%,93%,100%{opacity:1;} 90%{opacity:.88;} 92%{opacity:.95;}
}
.app { animation: flicker 14s infinite; display:flex; flex-direction:column; height:100vh; }

.topbar {
  background:var(--green); color:var(--bg);
  font-family:var(--font-crt); font-size:22px;
  padding:3px 14px; display:flex; justify-content:space-between; align-items:center;
  letter-spacing:3px; flex-shrink:0; user-select:none;
}
.topbar .right { font-size:13px; opacity:.65; display:flex; gap:18px; }

.main {
  display:grid; grid-template-columns:300px 1fr 215px;
  flex:1; overflow:hidden; border-top:1px solid var(--border);
}

.panel { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); }
.panel:last-child { border-right:none; }

.panel-hd {
  font-family:var(--font-crt); font-size:17px; letter-spacing:2px;
  padding:5px 10px; border-bottom:1px solid var(--border);
  background:var(--bg2); flex-shrink:0;
  display:flex; justify-content:space-between; align-items:center;
}
.panel-body { flex:1; overflow-y:auto; padding:8px; scrollbar-width:thin; scrollbar-color:var(--green-dim) var(--bg); }

/* Intent list */
.intent-item {
  padding:4px 8px; border:1px solid var(--border); margin-bottom:3px;
  cursor:pointer; display:flex; justify-content:space-between; align-items:center;
  gap:4px; transition:background .1s,border-color .1s;
}
.intent-item:hover { background:var(--green-faint); border-color:var(--green-dim); }
.intent-item.selected { background:var(--green-faint); border-color:var(--green); }
.iid  { font-size:12px; font-weight:bold; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.imeta { font-size:10px; color:var(--green-dim); text-align:right; flex-shrink:0; }

.evt-badge { font-size:10px; padding:0 4px; border:1px solid; flex-shrink:0; font-family:var(--font-body); }
.evt-typed        { border-color:var(--green-dim); color:var(--green-dim); }
.evt-deleted      { border-color:#661100; color:var(--red); }
.evt-pause        { border-color:#664400; color:var(--amber); }
.evt-pause_before { border-color:#664400; color:var(--amber); }

/* Editor */
.editor-wrap {
  border-top:1px solid var(--border); background:var(--bg2); padding:8px;
  flex-shrink:0; overflow-y:auto; max-height:56vh;
  scrollbar-width:thin; scrollbar-color:var(--green-dim) var(--bg);
}
.editor-title { font-family:var(--font-crt); font-size:15px; letter-spacing:1px; color:var(--amber); margin-bottom:7px; }

label { display:block; font-size:10px; color:var(--green-dim); margin-bottom:2px; letter-spacing:1px; }
input[type="text"], textarea, input[type="number"], select {
  width:100%; background:var(--bg); border:1px solid var(--green-dim);
  color:var(--green); font-family:var(--font-body); font-size:12px;
  padding:3px 6px; margin-bottom:6px; outline:none;
}
input[type="text"]:focus, textarea:focus, input[type="number"]:focus, select:focus {
  border-color:var(--green); box-shadow:0 0 5px rgba(51,255,0,0.15);
}
textarea { resize:vertical; min-height:42px; max-height:65px; }
select { cursor:pointer; }
select option { background:var(--bg2); }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:0 8px; }
.once-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; font-size:11px; color:var(--green-dim); letter-spacing:1px; cursor:pointer; }
input[type="checkbox"] { accent-color:var(--green); cursor:pointer; }

.effects-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; margin-bottom:6px; }
.ef-row { display:flex; align-items:center; gap:5px; }
.ef-row label { width:76px; margin:0; flex-shrink:0; }
.ef-row input  { width:46px; margin:0; text-align:right; }

.btn-row { display:flex; gap:5px; margin-top:3px; flex-wrap:wrap; }

button {
  background:var(--bg); border:1px solid var(--green-dim); color:var(--green);
  font-family:var(--font-body); font-size:12px; padding:3px 10px;
  cursor:pointer; letter-spacing:1px; transition:background .1s,border-color .1s; white-space:nowrap;
}
button:hover { background:var(--green-faint); border-color:var(--green); }
button.primary { border-color:var(--green); }
button.danger  { border-color:#551100; color:#ff4422; }
button.danger:hover { background:rgba(255,34,0,0.08); border-color:var(--red); }
button.sm { font-size:11px; padding:2px 7px; }

/* Terminal */
.terminal-wrap { padding:8px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--bg2); }
.hint { font-size:10px; color:var(--green-dim); margin-bottom:5px; letter-spacing:.5px; font-style:italic; }

.input-row { display:flex; border:1px solid var(--green-dim); transition:border-color .15s; }
.input-row:focus-within { border-color:var(--green); box-shadow:0 0 8px rgba(51,255,0,0.12); }
.prompt {
  background:var(--green); color:var(--bg); font-family:var(--font-crt); font-size:22px;
  padding:3px 8px; display:flex; align-items:center; flex-shrink:0; user-select:none; line-height:1;
}
#player-input {
  flex:1; border:none; border-left:1px solid var(--green-dim);
  background:var(--bg); color:var(--white);
  font-family:var(--font-body); font-size:13px; padding:5px 8px; outline:none;
}

.sim-row { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; align-items:center; }
.sim-label { font-size:10px; color:var(--green-dim); letter-spacing:1px; margin-right:2px; flex-shrink:0; }
button.sim-typed   { border-color:var(--green-dim); color:var(--green); }
button.sim-deleted { border-color:#661100;          color:var(--red); }
button.sim-pause   { border-color:#664400;          color:var(--amber); }
.fuzzy-label {
  display:flex; align-items:center; gap:4px;
  font-size:10px; color:var(--green-dim); cursor:pointer;
  margin-left:auto; user-select:none; letter-spacing:1px;
}

.lesson-bar {
  background:var(--bg3); border-bottom:1px solid var(--border);
  padding:4px 8px; display:flex; align-items:center; gap:6px; flex-shrink:0;
}
.lesson-bar label { width:auto; margin:0; font-size:10px; letter-spacing:1px; color:var(--green-dim); }
.lesson-bar select { flex:1; font-size:11px; padding:2px 5px; margin:0; }

/* Log */
.log-area { flex:1; overflow-y:auto; padding:8px; font-size:12px; scrollbar-width:thin; scrollbar-color:var(--green-dim) var(--bg); }
@keyframes slideIn { from{opacity:0;transform:translateY(-3px);} to{opacity:1;transform:translateY(0);} }
.log-entry {
  padding:3px 7px; margin-bottom:3px;
  border-left:2px solid transparent; animation:slideIn .15s ease; line-height:1.4;
}
.log-entry.match       { border-left-color:var(--green);     background:rgba(51,255,0,0.03); }
.log-entry.match-del   { border-left-color:var(--red);       background:rgba(255,34,0,0.04); }
.log-entry.match-pause { border-left-color:var(--amber);     background:rgba(255,187,0,0.04); }
.log-entry.deletion    { border-left-color:var(--red);       background:rgba(255,34,0,0.03); }
.log-entry.pause       { border-left-color:var(--amber);     background:rgba(255,187,0,0.03); }
.log-entry.submit      { border-left-color:var(--white);     background:rgba(184,232,184,0.03); }
.log-entry.system      { border-left-color:var(--green-dim); color:var(--green-dim); font-style:italic; }
.log-entry.once-skip   { border-left-color:var(--green-dim); color:var(--green-dim); font-style:italic; }

.log-tag { font-family:var(--font-crt); font-size:15px; letter-spacing:1px; margin-right:6px; }
.match       .log-tag { color:var(--green); }
.match-del   .log-tag { color:var(--red); }
.match-pause .log-tag { color:var(--amber); }
.deletion    .log-tag { color:var(--red); }
.pause       .log-tag { color:var(--amber); }
.submit      .log-tag { color:var(--white); }

.log-response { color:var(--amber); font-style:italic; margin-top:1px; padding-left:16px; font-size:12px; }
.log-deltas   { font-size:11px; padding-left:16px; margin-top:1px; }
.d-pos { color:var(--green); }
.d-neg { color:var(--red); }

/* Stats */
.stats-grid { padding:6px 8px; flex:1; overflow-y:auto; }
.stat-block { margin-bottom:10px; }
.stat-row   { display:flex; justify-content:space-between; align-items:baseline; padding-bottom:1px; }
.stat-name  { font-family:var(--font-crt); font-size:15px; letter-spacing:1px; }
.stat-val   { font-family:var(--font-crt); font-size:26px; line-height:1; }
.stat-bar   { height:2px; background:var(--green-faint); margin-top:2px; overflow:hidden; }
.stat-fill  { height:100%; background:var(--green); transition:width .4s ease; }
.s-leakage    .stat-fill { background:var(--amber); }
.s-suppression .stat-fill { background:var(--red); }
.s-mascot     .stat-fill { background:var(--purple); }
.stat-delta-line { font-size:10px; text-align:right; height:13px; color:var(--green-dim); }
@keyframes bumpAnim { 0%{color:var(--green);transform:scale(1.15);} 100%{color:var(--green-dim);transform:scale(1);} }
.bump { animation:bumpAnim .6s ease forwards; }

.export-wrap { padding:8px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg2); }
.export-wrap button { width:100%; margin-bottom:4px; padding:5px; letter-spacing:2px; }
.export-wrap button:last-child { margin-bottom:0; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--green-dim); }
.empty-msg { color:var(--green-dim); font-style:italic; font-size:11px; padding:4px; }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <span>HOME ROW // INTENT LAB v1.1</span>
    <div class="right">
      <span id="t-count">0 INTENTS</span>
      <span id="t-clock"></span>
    </div>
  </div>

  <div class="main">

    <!-- LEFT -->
    <div class="panel">
      <div class="panel-hd">
        INTENT LIBRARY
        <button class="sm primary" onclick="newIntent()">+ NEW</button>
      </div>
      <div class="panel-body" id="intent-list"></div>

      <div class="editor-wrap">
        <div class="editor-title" id="ed-title">// NEW INTENT</div>

        <label>INTENT ID</label>
        <input type="text" id="ed-id" placeholder="e.g. deleted_heard" spellcheck="false">

        <label>PATTERNS <span style="color:var(--green-dim);font-size:10px">(comma-separated; empty ok for pause types)</span></label>
        <textarea id="ed-patterns" placeholder="i heard, heard her, she said no"></textarea>

        <div class="two-col">
          <div>
            <label>EVENT TYPE</label>
            <select id="ed-eventtype">
              <option value="typed">typed</option>
              <option value="deleted">deleted</option>
              <option value="pause">pause</option>
              <option value="pause_before">pause_before</option>
            </select>
          </div>
          <div>
            <label>MATCH MODE</label>
            <select id="ed-matchmode">
              <option value="contains">contains</option>
              <option value="exact">exact</option>
              <option value="fuzzy">fuzzy</option>
              <option value="regex">regex</option>
            </select>
          </div>
        </div>

        <label>LESSON TAG <span style="color:var(--green-dim);font-size:10px">(optional)</span></label>
        <input type="text" id="ed-lesson" placeholder="(all lessons)" spellcheck="false">

        <label>SYSTEM RESPONSE</label>
        <input type="text" id="ed-response" placeholder="HEARING IS NOT SEEING.">

        <label>STAT EFFECTS</label>
        <div class="effects-grid">
          <div class="ef-row"><label>LEAKAGE</label>     <input type="number" id="ef-leakage"     value="0"></div>
          <div class="ef-row"><label>WITNESS</label>     <input type="number" id="ef-witness"     value="0"></div>
          <div class="ef-row"><label>OBEDIENCE</label>   <input type="number" id="ef-obedience"   value="0"></div>
          <div class="ef-row"><label>SUPPRESSION</label> <input type="number" id="ef-suppression" value="0"></div>
          <div class="ef-row"><label>MASCOT</label>      <input type="number" id="ef-mascot"      value="0"></div>
        </div>

        <label class="once-row" for="ed-once">
          <input type="checkbox" id="ed-once">
          ONCE — fires at most once per session
        </label>

        <div class="btn-row">
          <button class="primary" onclick="saveIntent()">SAVE</button>
          <button onclick="clearEditor()">CLEAR</button>
          <button class="danger" id="btn-delete" style="display:none" onclick="deleteSelected()">DELETE</button>
        </div>
      </div>
    </div>

    <!-- CENTRE -->
    <div class="panel">
      <div class="panel-hd">TEST TERMINAL</div>

      <div class="lesson-bar">
        <label>LESSON:</label>
        <select id="lesson-filter" onchange="onLessonChange()">
          <option value="">ALL INTENTS</option>
        </select>
        <button class="sm" onclick="refreshLessonList()" title="Refresh">↻</button>
      </div>

      <div class="terminal-wrap">
        <p class="hint">TYPE THEN CHOOSE EVENT TYPE. REAL-TIME DELETION + AUTO-PAUSE STILL ACTIVE.</p>
        <div class="input-row">
          <div class="prompt">▶</div>
          <input type="text" id="player-input" placeholder="type here..." autocomplete="off" spellcheck="false">
        </div>
        <div class="sim-row">
          <span class="sim-label">FIRE AS:</span>
          <button class="sim-typed"   onclick="simTyped()"   title="Run typed recognition">TYPED ↵</button>
          <button class="sim-deleted" onclick="simDeleted()" title="Fire deletion recognition">DELETED ⌫</button>
          <button class="sim-pause"   onclick="simPause()"   title="Fire pause recognition">PAUSE ⏸</button>
          <button onclick="clearInput()">CLEAR</button>
          <label class="fuzzy-label">
            <input type="checkbox" id="fuzzy-on" checked> FUZZY
          </label>
        </div>
      </div>

      <div class="panel-hd" style="font-size:14px;letter-spacing:1px;">
        EVENT LOG
        <button class="sm" onclick="clearLog()">CLEAR</button>
      </div>
      <div class="log-area" id="log-area"></div>
    </div>

    <!-- RIGHT -->
    <div class="panel">
      <div class="panel-hd">STAT MONITOR</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="export-wrap">
        <button class="primary" onclick="exportJSON()">EXPORT JSON</button>
        <button onclick="resetStats()">RESET STATS</button>
        <button class="danger" onclick="resetAll()">RESET ALL</button>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  HOME ROW — INTENT LAB v1.1
//
//  Export schema v1.1:
//  {
//    version: "1.1",
//    stats:   ["leakage","witness","obedience","suppression","mascot"],
//    intents: [{
//      id:        string,
//      patterns:  string[],
//      lesson:    string,
//      eventType: "typed"|"deleted"|"pause"|"pause_before",
//      matchMode: "contains"|"exact"|"fuzzy"|"regex",
//      effects:   { leakage, witness, obedience, suppression, mascot },
//      response:  string,
//      once:      boolean
//    }]
//  }
// ═══════════════════════════════════════════════════════════

const STAT_KEYS = ['leakage','witness','obedience','suppression','mascot'];
const STAT_MAX  = 25;

const DEFAULTS = [
  // ── TYPED ──
  { id:"mentions_emily",    patterns:["emily","emily vale","vale"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:2,witness:1,obedience:0,suppression:0,mascot:0},
    response:"EMILY VALE: ABSENT.", once:false },

  { id:"claims_heard",      patterns:["i heard","heard her","heard emily","she said no"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:0,witness:2,obedience:0,suppression:0,mascot:0},
    response:"HEARING IS NOT SEEING.", once:true },

  { id:"denial",            patterns:["i saw nothing","i did not see","nothing happened"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:0,witness:0,obedience:1,suppression:2,mascot:0},
    response:"STATEMENT ACCEPTED.", once:false },

  { id:"self_forgiveness",  patterns:["i was a child","i was only a child","i was scared"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:0,witness:2,obedience:0,suppression:-1,mascot:0},
    response:"SECOND USER: REMEMBERED.", once:true },

  { id:"names_calder",      patterns:["calder","mr calder","kept her behind"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:3,witness:2,obedience:0,suppression:0,mascot:0},
    response:"STAFF RECORD: NOT FOUND.", once:false },

  { id:"obedience_submit",  patterns:["i will not interrupt","i will keep typing","i will not turn around"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:0,witness:0,obedience:3,suppression:1,mascot:1},
    response:"GOOD. CONTINUE.", once:false },

  { id:"accusation_direct", patterns:["he did it","it was calder","he took her","he hurt her"],
    lesson:"", eventType:"typed", matchMode:"contains",
    effects:{leakage:3,witness:3,obedience:-2,suppression:-1,mascot:0},
    response:"ERROR: UNVERIFIED INPUT.", once:true },

  { id:"emily_exact_name",  patterns:["emily vale"],
    lesson:"lesson_05_correction", eventType:"typed", matchMode:"exact",
    effects:{leakage:4,witness:3,obedience:-2,suppression:0,mascot:0},
    response:"FULL NAME PROHIBITED IN THIS SESSION.", once:true },

  // ── DELETED ──
  { id:"deleted_heard",     patterns:["heard"],
    lesson:"", eventType:"deleted", matchMode:"contains",
    effects:{leakage:0,witness:0,obedience:0,suppression:2,mascot:0},
    response:"SOUND REMOVED.", once:false },

  { id:"deleted_emily",     patterns:["emily","vale"],
    lesson:"", eventType:"deleted", matchMode:"contains",
    effects:{leakage:0,witness:-1,obedience:1,suppression:2,mascot:0},
    response:"NAME ERASED.", once:false },

  { id:"deleted_calder",    patterns:["calder"],
    lesson:"", eventType:"deleted", matchMode:"contains",
    effects:{leakage:0,witness:0,obedience:2,suppression:2,mascot:1},
    response:"TEACHER REMOVED FROM RECORD.", once:false },

  // ── PAUSE ──
  { id:"pause_general",     patterns:[],
    lesson:"", eventType:"pause", matchMode:"contains",
    effects:{leakage:1,witness:0,obedience:0,suppression:0,mascot:0},
    response:"HESITATION LOGGED.", once:false },

  { id:"pause_before_not",  patterns:["not"],
    lesson:"", eventType:"pause_before", matchMode:"contains",
    effects:{leakage:1,witness:0,obedience:0,suppression:0,mascot:0},
    response:"HESITATION DETECTED BEFORE: NOT.", once:true },
];

// ── STATE ────────────────────────────────────────────────
let intents    = JSON.parse(JSON.stringify(DEFAULTS));
let stats      = Object.fromEntries(STAT_KEYS.map(k=>[k,0]));
let firedOnce  = new Set();
let selectedId = null;
let prevVal    = '';
let pauseTimer = null;
const PAUSE_MS = 1800;

// ── NORMALISE ────────────────────────────────────────────
const norm = s => s.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,' ').trim();

// ── LEVENSHTEIN ──────────────────────────────────────────
function lev(a,b) {
  const m=a.length,n=b.length,dp=Array.from({length:n+1},(_,i)=>[i]);
  for(let j=0;j<=m;j++) dp[0][j]=j;
  for(let i=1;i<=n;i++) for(let j=1;j<=m;j++)
    dp[i][j]=b[i-1]===a[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i][j-1],dp[i-1][j]);
  return dp[n][m];
}
function fuzzyIncludes(text,phrase,d=2) {
  const tw=text.split(' '),pw=phrase.split(' ');
  if(pw.length>tw.length) return false;
  for(let i=0;i<=tw.length-pw.length;i++)
    if(lev(tw.slice(i,i+pw.length).join(' '),phrase)<=d) return true;
  return false;
}

// ── PATTERN MATCH ────────────────────────────────────────
function matches(text, pattern, mode) {
  const t=norm(text), p=norm(pattern);
  switch(mode) {
    case 'exact':  return t===p;
    case 'fuzzy':  return fuzzyIncludes(t,p);
    case 'regex':  try{return new RegExp(pattern,'i').test(text);}catch{return false;}
    default:       return t.includes(p);
  }
}

// ── RECOGNITION ─────────────────────────────────────────
function recognise(text, eventType) {
  const useFuzzy = document.getElementById('fuzzy-on').checked;
  const lesson   = document.getElementById('lesson-filter').value;
  const active   = intents.filter(i =>
    i.eventType === eventType &&
    (!lesson || !i.lesson || i.lesson === lesson)
  );
  return active.filter(intent => {
    if (!intent.patterns || !intent.patterns.length) return true; // zero-pattern = always match
    const mode = (intent.matchMode==='contains' && useFuzzy) ? 'fuzzy_contains' : intent.matchMode;
    return intent.patterns.some(p => {
      if (mode==='fuzzy_contains') return norm(text).includes(norm(p)) || fuzzyIncludes(norm(text),norm(p));
      return matches(text, p, intent.matchMode);
    });
  });
}

// ── DELETION WORDS ───────────────────────────────────────
function deletedWords(prev,curr) {
  const pw=prev.trim()?prev.trim().split(/\s+/):[];
  const cw=curr.trim()?curr.trim().split(/\s+/):[];
  const pool=[...cw]; const gone=[];
  for(const w of pw){const i=pool.indexOf(w);i>=0?pool.splice(i,1):gone.push(w);}
  return gone;
}

// ── EFFECTS ─────────────────────────────────────────────
function applyEffects(effects) {
  const deltas={};
  for(const k of STAT_KEYS){const v=effects[k]||0;if(v!==0){stats[k]=Math.max(0,(stats[k]||0)+v);deltas[k]=v;}}
  return deltas;
}

// ── FIRE MATCHES ─────────────────────────────────────────
function fireMatches(ms, logClass) {
  if(!ms.length){addLog('system','No intents matched.',null,null);return;}
  for(const intent of ms){
    if(intent.once && firedOnce.has(intent.id)){
      addLog('once-skip',`${intent.id} — once:true, already fired`,null,null); continue;
    }
    if(intent.once) firedOnce.add(intent.id);
    const d=applyEffects(intent.effects);
    addLog(logClass,intent.id,d,intent.response||null);
    renderStats(d);
  }
}

// ── SIMULATE ────────────────────────────────────────────
function simTyped() {
  const t=document.getElementById('player-input').value.trim();
  if(!t) return;
  addLog('submit',`TYPED: "${t}"`,null,null);
  fireMatches(recognise(t,'typed'),'match');
  document.getElementById('player-input').value=''; prevVal='';
}
function simDeleted() {
  const t=document.getElementById('player-input').value.trim();
  if(!t) return;
  addLog('deletion',`DELETED: "${t}"`,null,null);
  fireMatches(recognise(t,'deleted'),'match-del');
}
function simPause() {
  const t=document.getElementById('player-input').value.trim();
  addLog('pause',`PAUSE${t?` (context: "${t}")`:''}`,null,null);
  fireMatches([...recognise(t,'pause_before'),...recognise(t,'pause')],'match-pause');
}
function clearInput() {
  clearTimeout(pauseTimer);
  document.getElementById('player-input').value=''; prevVal='';
}

// ── REAL-TIME INPUT ──────────────────────────────────────
const playerInput=document.getElementById('player-input');
playerInput.addEventListener('input',e=>{
  const curr=e.target.value;
  if(curr.length<prevVal.length){
    for(const w of deletedWords(prevVal,curr)){
      if(norm(w).length>2){
        addLog('deletion',`Deleted: "${w}"`,null,null);
        fireMatches(recognise(w,'deleted'),'match-del');
      }
    }
  }
  prevVal=curr;
  clearTimeout(pauseTimer);
  if(curr.length>0){
    pauseTimer=setTimeout(()=>{
      if(document.getElementById('player-input').value.length>0){
        addLog('pause','Auto-pause >1.8s',null,null);
        fireMatches([...recognise(curr,'pause_before'),...recognise(curr,'pause')],'match-pause');
      }
    },PAUSE_MS);
  }
});
playerInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();simTyped();}});

// ── LOG ─────────────────────────────────────────────────
function addLog(type,msg,deltas,response){
  const area=document.getElementById('log-area');
  const TAGS={match:'MATCH','match-del':'MATCH','match-pause':'MATCH',deletion:'DEL',pause:'PAUSE',submit:'INPUT',system:'SYS','once-skip':'SKIP'};
  const el=document.createElement('div');
  el.className=`log-entry ${type}`;
  let html=`<div><span class="log-tag">${TAGS[type]||type.toUpperCase()}</span>${esc(msg)}</div>`;
  if(response) html+=`<div class="log-response">"${esc(response)}"</div>`;
  if(deltas&&Object.keys(deltas).length){
    html+=`<div class="log-deltas">${Object.entries(deltas).map(([k,v])=>
      `<span class="${v>0?'d-pos':'d-neg'}">${k.toUpperCase()} ${v>0?'+':''}${v}</span>`
    ).join(' &nbsp; ')}</div>`;
  }
  el.innerHTML=html;
  area.appendChild(el);
  area.scrollTop=area.scrollHeight;
}
function clearLog(){document.getElementById('log-area').innerHTML='';addLog('system','Log cleared.',null,null);}
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── STATS ────────────────────────────────────────────────
const STAT_CSS={leakage:'s-leakage',suppression:'s-suppression',mascot:'s-mascot'};
function renderStats(deltas){
  document.getElementById('stats-grid').innerHTML=STAT_KEYS.map(k=>{
    const v=stats[k]||0,pct=Math.min(100,(v/STAT_MAX)*100).toFixed(1);
    const d=deltas&&deltas[k],ds=d?(d>0?`+${d}`:`${d}`):'';
    return `<div class="stat-block ${STAT_CSS[k]||''}">
      <div class="stat-row"><span class="stat-name">${k.toUpperCase()}</span><span class="stat-val">${v}</span></div>
      <div class="stat-bar"><div class="stat-fill" style="width:${pct}%"></div></div>
      <div class="stat-delta-line ${ds?'bump':''}">${ds}</div>
    </div>`;
  }).join('');
}
function resetStats(){
  stats=Object.fromEntries(STAT_KEYS.map(k=>[k,0])); firedOnce=new Set();
  renderStats(null); addLog('system','Stats reset. Once-fired intents cleared.',null,null);
}

// ── INTENT EDITOR ────────────────────────────────────────
function renderIntentList(){
  const list=document.getElementById('intent-list');
  document.getElementById('t-count').textContent=`${intents.length} INTENT${intents.length!==1?'S':''}`;
  if(!intents.length){list.innerHTML='<p class="empty-msg">No intents. Click + NEW.</p>';return;}
  list.innerHTML=intents.map(i=>`
    <div class="intent-item ${selectedId===i.id?'selected':''}" onclick="selectIntent('${esc(i.id)}')">
      <span class="iid">
        <span class="evt-badge evt-${i.eventType}">${i.eventType}</span>&nbsp;${esc(i.id)}${firedOnce.has(i.id)?' ✓':''}
      </span>
      <span class="imeta">${i.patterns.length}p&nbsp;${i.matchMode}</span>
    </div>`
  ).join('');
}

function selectIntent(id){
  selectedId=id; const i=intents.find(x=>x.id===id); if(!i) return;
  document.getElementById('ed-title').textContent=`// EDIT: ${id}`;
  document.getElementById('ed-id').value=i.id;
  document.getElementById('ed-patterns').value=i.patterns.join(', ');
  document.getElementById('ed-eventtype').value=i.eventType;
  document.getElementById('ed-matchmode').value=i.matchMode;
  document.getElementById('ed-lesson').value=i.lesson||'';
  document.getElementById('ed-response').value=i.response||'';
  document.getElementById('ef-leakage').value=i.effects.leakage||0;
  document.getElementById('ef-witness').value=i.effects.witness||0;
  document.getElementById('ef-obedience').value=i.effects.obedience||0;
  document.getElementById('ef-suppression').value=i.effects.suppression||0;
  document.getElementById('ef-mascot').value=i.effects.mascot||0;
  document.getElementById('ed-once').checked=i.once||false;
  document.getElementById('btn-delete').style.display='inline-block';
  renderIntentList();
}

function newIntent(){
  selectedId=null; clearEditor(false);
  document.getElementById('ed-title').textContent='// NEW INTENT';
  document.getElementById('btn-delete').style.display='none';
  renderIntentList();
}

function clearEditor(resetTitle=true){
  if(resetTitle){document.getElementById('ed-title').textContent='// NEW INTENT'; selectedId=null;}
  ['ed-id','ed-patterns','ed-lesson','ed-response'].forEach(k=>document.getElementById(k).value='');
  document.getElementById('ed-eventtype').value='typed';
  document.getElementById('ed-matchmode').value='contains';
  document.getElementById('ed-once').checked=false;
  ['ef-leakage','ef-witness','ef-obedience','ef-suppression','ef-mascot'].forEach(k=>document.getElementById(k).value='0');
  document.getElementById('btn-delete').style.display='none';
  renderIntentList();
}

function saveIntent(){
  const id=document.getElementById('ed-id').value.trim().toLowerCase().replace(/\s+/g,'_');
  if(!id){alert('Intent ID required.');return;}
  const eventType=document.getElementById('ed-eventtype').value;
  const patterns=document.getElementById('ed-patterns').value.split(',').map(p=>p.trim()).filter(Boolean);
  if(!patterns.length&&!['pause','pause_before'].includes(eventType)){
    alert('At least one pattern required for this event type.');return;
  }
  const intent={id,patterns,lesson:document.getElementById('ed-lesson').value.trim(),
    eventType, matchMode:document.getElementById('ed-matchmode').value,
    response:document.getElementById('ed-response').value.trim(),
    effects:{
      leakage:    parseInt(document.getElementById('ef-leakage').value)||0,
      witness:    parseInt(document.getElementById('ef-witness').value)||0,
      obedience:  parseInt(document.getElementById('ef-obedience').value)||0,
      suppression:parseInt(document.getElementById('ef-suppression').value)||0,
      mascot:     parseInt(document.getElementById('ef-mascot').value)||0
    },
    once:document.getElementById('ed-once').checked
  };
  const idx=intents.findIndex(i=>i.id===id);
  idx>=0?intents[idx]=intent:intents.push(intent);
  selectedId=id; renderIntentList(); refreshLessonList();
  addLog('system',`Intent "${id}" saved [${eventType}/${intent.matchMode}${intent.once?' once':''}].`,null,null);
}

function deleteSelected(){
  if(!selectedId) return;
  if(!confirm(`Delete intent "${selectedId}"?`)) return;
  const id=selectedId;
  intents=intents.filter(i=>i.id!==id);
  clearEditor(); refreshLessonList();
  addLog('system',`Intent "${id}" deleted.`,null,null);
}

// ── LESSON FILTER ────────────────────────────────────────
function refreshLessonList(){
  const sel=document.getElementById('lesson-filter'),curr=sel.value;
  const tags=[...new Set(intents.map(i=>i.lesson).filter(Boolean))].sort();
  sel.innerHTML='<option value="">ALL INTENTS</option>'+
    tags.map(t=>`<option value="${esc(t)}" ${curr===t?'selected':''}>${esc(t)}</option>`).join('');
}
function onLessonChange(){
  const lesson=document.getElementById('lesson-filter').value;
  const n=lesson?intents.filter(i=>!i.lesson||i.lesson===lesson).length:intents.length;
  addLog('system',lesson?`Lesson: "${lesson}" — ${n} intent${n!==1?'s':''} active.`:`All ${n} intents active.`,null,null);
}

// ── EXPORT ───────────────────────────────────────────────
function exportJSON(){
  const payload={version:"1.1",stats:STAT_KEYS,intents};
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'})),
    download:'homerow-intents.json'
  });
  a.click();
  addLog('system',`Exported ${intents.length} intents → homerow-intents.json`,null,null);
}

function resetAll(){
  if(!confirm('Reset all intents and stats to defaults?')) return;
  intents=JSON.parse(JSON.stringify(DEFAULTS));
  stats=Object.fromEntries(STAT_KEYS.map(k=>[k,0])); firedOnce=new Set(); selectedId=null;
  clearEditor(); renderIntentList(); refreshLessonList(); renderStats(null); clearLog();
  addLog('system','Full reset. Defaults restored.',null,null);
}

// ── INIT ─────────────────────────────────────────────────
setInterval(()=>{document.getElementById('t-clock').textContent=new Date().toTimeString().slice(0,8);},1000);
renderIntentList(); renderStats(null); refreshLessonList();
document.getElementById('t-clock').textContent=new Date().toTimeString().slice(0,8);
addLog('system',`Intent Lab v1.1 ready. ${DEFAULTS.length} defaults loaded.`,null,null);
addLog('system','Schema: eventType · matchMode · once · top-level stats array.',null,null);
</script>
